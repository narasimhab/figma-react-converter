<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      padding: 16px;
      margin: 0;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    label {
      font-size: 12px;
      font-weight: 600;
    }
    select {
      padding: 4px 8px;
      font-size: 12px;
    }
    textarea {
      width: 100%;
      height: 360px;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 16px;
    }
    h3 {
      margin: 0 0 8px 0;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 4px 0 10px 0;
      font-size: 12px;
    }
    .options label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-weight: 500;
    }
  </style>
</head>
<body>

<h3>Paste HTML (or JSX) — pixel-accurate render</h3>
<p style="font-size:11px;color:#555;margin:0 0 8px 0;">
  Auto-detects <strong>Tailwind</strong>, <strong>Bootstrap CSS</strong>, <strong>Font Awesome</strong>, and <strong>Bootstrap Icons</strong> (<code>bi-*</code>) and loads CDN styles in the capture iframe when needed.
</p>

<div class="options">
  <label><input type="checkbox" id="showHiddenMenus"> Show hidden dropdown menus <span style="color:#888;">(opens all dropdowns &mdash; they'll overlay the header)</span></label>
  <label><input type="checkbox" id="multiView"> One frame per <code>.view-section</code> (Present-mode navigation)</label>
  <label><input type="checkbox" id="useAutoLayout"> Use Figma auto-layout <span style="color:#888;">(responsive, may shift positions)</span></label>
</div>

<div class="row" style="margin-bottom:10px;">
  <label for="baseUrl" style="white-space:nowrap;">Base URL for <code>img</code>/CSS:</label>
  <input type="text" id="baseUrl" placeholder="https://example.com/site/" style="flex:1;padding:4px 8px;font-size:12px;">
</div>

<textarea id="jsx">&lt;header class="flex items-center justify-between bg-gradient-to-r from-[#02145d] to-[#04228c] px-8 py-4 text-white"&gt;
  &lt;div class="flex items-center gap-3"&gt;
    &lt;span class="font-black text-lg uppercase"&gt;CorpLink&lt;/span&gt;
  &lt;/div&gt;
  &lt;nav class="flex items-center gap-2"&gt;
    &lt;button class="active-nav px-4 py-2 rounded-xl text-xs font-bold"&gt;Dashboard&lt;/button&gt;
    &lt;button class="px-4 py-2 rounded-xl text-xs font-bold text-white/80"&gt;People&lt;/button&gt;
    &lt;button class="px-4 py-2 rounded-xl text-xs font-bold text-white/80"&gt;Management&lt;/button&gt;
  &lt;/nav&gt;
&lt;/header&gt;</textarea>

<button id="convert">Convert To Figma</button>

<div id="status"></div>

<script>/* bundled by build.js into dist/ui.html */</script>
</body>
</html>
